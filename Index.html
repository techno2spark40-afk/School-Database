<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>শিক্ষার্থী তালিকা</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; padding: 30px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .table-container { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .status-active { background-color: #d1e7dd; color: #0f5132; padding: 4px 10px; border-radius: 20px; font-size: 14px; }
    .status-inactive { background-color: #f8d7da; color: #842029; padding: 4px 10px; border-radius: 20px; font-size: 14px; }
  </style>
</head>
<body>

  <div class="container">
    <div class="table-container">
      <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <h2 class="fw-bold text-primary">🏫 শিক্ষার্থী ডাটাবেজ (Google Sheets Live)</h2>
        <button onclick="fetchDataFromServer()" class="btn btn-primary">🔄 রিফ্রেশ ডাটা</button>
      </div>

      <!-- লোডিং এনিমেশন -->
      <div id="loading" class="text-center p-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-secondary">গুগল শিট থেকে ডাটা লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</p>
      </div>

      <!-- এরর মেসেজ -->
      <div id="error-alert" class="alert alert-danger d-none"></div>

      <!-- ডাটা টেবিল -->
      <div id="table-wrapper" class="table-responsive d-none">
        <table class="table table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>আইডি (ID)</th>
              <th>শিক্ষার্থীর নাম</th>
              <th>শ্রেণী</th>
              <th>শাখা</th>
              <th>রোল</th>
              <th>মোবাইল নম্বর</th>
              <th>স্ট্যাটাস</th>
            </tr>
          </thead>
          <tbody id="student-table-body">
            <!-- এখানে জাভাস্ক্রিপ্ট দিয়ে ডাটা ঢুকবে -->
          </tbody>
        </table>
      </div>
      
    </div>
  </div>

  <script>
    // পেজ লোড হলেই ডাটা কল হবে
    document.addEventListener("DOMContentLoaded", () => {
      fetchDataFromServer();
    });

    function fetchDataFromServer() {
      // রিসেট ভিউ
      document.getElementById('loading').classList.remove('d-none');
      document.getElementById('table-wrapper').classList.add('d-none');
      document.getElementById('error-alert').classList.add('d-none');

      // গুগল ব্যাকএন্ড থেকে ডাটা আনা
      google.script.run
        .withSuccessHandler(response => {
          document.getElementById('loading').classList.add('d-none');
          
          if(response.success) {
            renderTable(response.students);
          } else {
            showError("ডাটা আনতে সমস্যা হয়েছে: " + response.error);
          }
        })
        .withFailureHandler(err => {
          document.getElementById('loading').classList.add('d-none');
          showError("সার্ভার কানেকশন এরর: " + err);
        })
        .getStudentsData();
    }

    function renderTable(students) {
      const tbody = document.getElementById('student-table-body');
      tbody.innerHTML = ""; // আগের ডাটা পরিষ্কার করা

      if(students.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted">কোনো ডাটা পাওয়া যায়নি! শিটে ডাটা লিখুন।</td></tr>`;
      } else {
        students.forEach(student => {
          const statusClass = student.Status === 'Active' ? 'status-active' : 'status-inactive';
          const row = `
            <tr>
              <td class="fw-bold">${student.StudentID || '-'}</td>
              <td>${student.FullName || '-'}</td>
              <td><span class="badge bg-secondary">${student.Class || '-'}</span></td>
              <td>${student.Section || '-'}</td>
              <td>${student.Roll || '-'}</td>
              <td>${student.Mobile || '-'}</td>
              <td><span class="${statusClass}">${student.Status || 'Inactive'}</span></td>
            </tr>
          `;
          tbody.innerHTML += row;
        });
      }
      
      document.getElementById('table-wrapper').classList.remove('d-none');
    }

    function showError(msg) {
      const alertDiv = document.getElementById('error-alert');
      alertDiv.innerText = msg;
      alertDiv.classList.remove('d-none');
    }
  </script>
</body>
</html>
